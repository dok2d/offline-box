---
####################
# Global settings
####################

# Service user (rootless podman)
svc_user: svc
svc_uid: 1001
svc_home: /home/svc

# Base directory for service data and config
opt_base: /opt

# All services listen on loopback only; nginx exposes them
listen_addr: 127.0.0.1

# Server address (used in nginx server_name and self-signed cert)
# Override with your actual IP or hostname
server_name: "{{ ansible_default_ipv4.address | default(ansible_host) }}"

# Enable HTTPS with self-signed certificate (set false for plain HTTP)
use_ssl: true

# TLS (self-signed)
ssl_cert_path: /etc/nginx/ssl/box.crt
ssl_key_path: /etc/nginx/ssl/box.key
ssl_dhparam_path: /etc/nginx/ssl/dhparam.pem

# Base container image for all services
container_base_image: docker.io/library/debian:13-slim


############################
# Service registry
############################
# Central dict describing every service — analogous to kolla-ansible's
# *_services dicts.  The dashboard template, playbook, and nginx all
# consume this structure.  Per-service defaults are in each role's
# defaults/main.yml; override them in host_vars or here.

offlinebox_services:
  kiwix:
    container_name: kiwix
    enabled: "{{ enable_kiwix }}"
    image: localhost/kiwix
    port: "{{ kiwix_port }}"
    data_dir: "{{ kiwix_data_dir }}"
    config_dir: "{{ kiwix_config_dir }}"
    dashboard:
      name: Kiwix
