---
# Offline Box — main playbook
#
# Architecture follows kolla-ansible conventions:
#   - Each service is a separate play targeting its inventory group.
#   - A host receives a service only if it belongs to the service's group
#     AND the service is enabled (enable_<service>: true).
#   - Facts are gathered once in the first play; subsequent plays skip it.
#
# Usage:
#   ansible-playbook -i inventory/all-in-one playbook.yml   # single host
#   ansible-playbook -i inventory/multinode  playbook.yml   # multi host

###############################################################################
# Gather facts (once for all hosts)
###############################################################################
- name: Gather facts for all hosts
  hosts: all
  become: true
  gather_facts: true
  tasks: []

###############################################################################
# Common infrastructure — runs on every host in the inventory
###############################################################################
- name: Apply common infrastructure
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - svc_user is defined
          - server_name is defined
        fail_msg: "Required variables missing. Check group_vars/all.yml"

  roles:
    - role: base
    - role: podman
    - role: nginx

###############################################################################
# Per-service plays
###############################################################################

- name: Apply role kiwix
  hosts: kiwix
  become: true
  gather_facts: false
  roles:
    - role: services/kiwix
      when: enable_kiwix | bool

