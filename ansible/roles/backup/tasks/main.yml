---
- name: Create backup destination directory
  ansible.builtin.file:
    path: "{{ backup_dest }}"
    state: directory
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0750"

- name: Create bin directory for svc user
  ansible.builtin.file:
    path: "{{ svc_home }}/bin"
    state: directory
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0755"

- name: Deploy backup script
  ansible.builtin.template:
    src: backup.sh.j2
    dest: "{{ svc_home }}/bin/offlinebox-backup.sh"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0750"

- name: Deploy backup systemd service unit
  ansible.builtin.template:
    src: backup.service.j2
    dest: "{{ svc_home }}/.config/systemd/user/offlinebox-backup.service"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0644"

- name: Deploy backup systemd timer unit
  ansible.builtin.template:
    src: backup.timer.j2
    dest: "{{ svc_home }}/.config/systemd/user/offlinebox-backup.timer"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0644"

- name: Enable and start backup timer
  become: true
  become_user: "{{ svc_user }}"
  ansible.builtin.systemd:
    name: offlinebox-backup.timer
    scope: user
    enabled: true
    state: started
    daemon_reload: true
