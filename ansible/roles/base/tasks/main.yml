---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - python3
      - python3-pip
      - ufw
      - acl
      - sudo
      - htop
      - iotop
      - tmux
    state: present
    install_recommends: false

- name: Set kernel parameters for containers
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
  loop:
    - { key: net.ipv4.ip_unprivileged_port_start, value: "1024" }
    - { key: kernel.unprivileged_userns_clone, value: "1" }
    - { key: net.ipv4.ip_forward, value: "1" }
    - { key: net.ipv4.ip_nonlocal_bind, value: "1" }

- name: Create service user {{ svc_user }}
  ansible.builtin.user:
    name: "{{ svc_user }}"
    uid: "{{ svc_uid }}"
    shell: /bin/bash
    create_home: true
    home: "{{ svc_home }}"

- name: Install logrotate
  ansible.builtin.apt:
    name: logrotate
    state: present
    install_recommends: false

- name: Create container log directory
  ansible.builtin.file:
    path: "{{ container_log_dir }}"
    state: directory
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0755"

- name: Create per-service log directories
  ansible.builtin.file:
    path: "{{ container_log_dir }}/{{ item.key }}"
    state: directory
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0755"
  loop: "{{ offlinebox_services | dict2items }}"
  when:
    - item.value.enabled | bool
    - inventory_hostname in groups.get(item.key, [])

- name: Deploy container logrotate config
  ansible.builtin.template:
    src: logrotate-containers.j2
    dest: /etc/logrotate.d/offlinebox-containers
    mode: "0644"

- name: Configure UFW defaults
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "{{ nginx_http_port | default('80') }}"
    proto: tcp

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "{{ nginx_https_port | default('443') }}"
    proto: tcp

- name: Allow Transmission peer port
  community.general.ufw:
    rule: allow
    port: "{{ transmission_peer_port | default(51413) | string }}"
    proto: tcp
  when:
    - enable_transmission | default(false) | bool
    - inventory_hostname in groups.get('transmission', [])

- name: Allow Syncthing ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "{{ syncthing_sync_port | default(22000) | string }}", proto: tcp }
    - { port: "{{ syncthing_discovery_port | default(21027) | string }}", proto: udp }
  when:
    - enable_syncthing | default(false) | bool
    - inventory_hostname in groups.get('syncthing', [])

- name: Allow Gitea SSH port
  community.general.ufw:
    rule: allow
    port: "{{ gitea_ssh_port | default(2222) | string }}"
    proto: tcp
  when:
    - enable_gitea | default(false) | bool
    - inventory_hostname in groups.get('gitea', [])

- name: Allow BigBlueButton FreeSWITCH media ports
  community.general.ufw:
    rule: allow
    port: "{{ bigbluebutton_freeswitch_port_start | default(16384) | string }}:{{ bigbluebutton_freeswitch_port_end | default(32768) | string }}"
    proto: udp
  when:
    - enable_bigbluebutton | default(false) | bool
    - inventory_hostname in groups.get('bigbluebutton', [])

- name: Enable UFW
  community.general.ufw:
    state: enabled
