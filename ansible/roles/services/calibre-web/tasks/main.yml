---
- name: Create Calibre-web data directory
  ansible.builtin.file:
    path: "{{ calibre_web_data_dir }}"
    state: directory
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0755"

- name: Create Calibre-web config directory
  ansible.builtin.file:
    path: "{{ calibre_web_config_dir }}"
    state: directory
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0755"

- name: Create Calibre-web library directory
  ansible.builtin.file:
    path: "{{ calibre_web_library_dir }}"
    state: directory
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0755"

- name: Download Calibre library archive
  ansible.builtin.get_url:
    url: "{{ calibre_web_library_url }}"
    dest: "{{ calibre_web_library_dir }}/library.zip"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0644"
    timeout: 3600
  when: calibre_web_library_url | default('') | length > 0

- name: Extract Calibre library archive
  ansible.builtin.unarchive:
    src: "{{ calibre_web_library_dir }}/library.zip"
    dest: "{{ calibre_web_library_dir }}"
    remote_src: true
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    creates: "{{ calibre_web_library_dir }}/metadata.db"
  when: calibre_web_library_url | default('') | length > 0

- name: Initialize empty Calibre metadata.db if missing
  ansible.builtin.shell: |
    python3 -c "
    import sqlite3, os
    db = '{{ calibre_web_library_dir }}/metadata.db'
    if not os.path.exists(db):
        conn = sqlite3.connect(db)
        c = conn.cursor()
        c.executescript('''
          CREATE TABLE IF NOT EXISTS books (id INTEGER PRIMARY KEY, title TEXT NOT NULL DEFAULT \"Unknown\", sort TEXT, timestamp TIMESTAMP DEFAULT CURRENT_TIMESTAMP, pubdate TIMESTAMP DEFAULT CURRENT_TIMESTAMP, series_index REAL NOT NULL DEFAULT 1.0, author_sort TEXT, isbn TEXT DEFAULT \"\", lccn TEXT DEFAULT \"\", path TEXT NOT NULL DEFAULT \"\", flags INTEGER NOT NULL DEFAULT 1, uuid TEXT, has_cover BOOL DEFAULT 0, last_modified TIMESTAMP NOT NULL DEFAULT \"2000-01-01 00:00:00+00:00\");
          CREATE TABLE IF NOT EXISTS authors (id INTEGER PRIMARY KEY, name TEXT NOT NULL, sort TEXT, link TEXT NOT NULL DEFAULT \"\");
          CREATE TABLE IF NOT EXISTS tags (id INTEGER PRIMARY KEY, name TEXT NOT NULL);
          CREATE TABLE IF NOT EXISTS data (id INTEGER PRIMARY KEY, book INTEGER NOT NULL, format TEXT NOT NULL, uncompressed_size INTEGER NOT NULL, name TEXT NOT NULL);
          CREATE TABLE IF NOT EXISTS preferences (id INTEGER PRIMARY KEY, key TEXT NOT NULL UNIQUE, val TEXT NOT NULL);
          INSERT OR IGNORE INTO preferences(key,val) VALUES('library_version','26');
        ''')
        conn.commit()
        conn.close()
        print('created')
    else:
        print('exists')
    "
  args:
    executable: /bin/bash
  register: calibre_init
  changed_when: "'created' in calibre_init.stdout"

- name: Set metadata.db ownership
  ansible.builtin.file:
    path: "{{ calibre_web_library_dir }}/metadata.db"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0644"

- name: Deploy Calibre-web Containerfile
  ansible.builtin.template:
    src: Containerfile.j2
    dest: "{{ calibre_web_config_dir }}/Containerfile"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0644"
  diff: true
  register: _containerfile

- name: Build Calibre-web container image
  become: true
  become_user: "{{ svc_user }}"
  containers.podman.podman_image:
    name: "{{ calibre_web_image }}"
    tag: "{{ calibre_web_tag }}"
    path: "{{ calibre_web_config_dir }}"
    force: "{{ _containerfile.changed | default(true) }}"

- name: Deploy Calibre-web systemd user unit
  ansible.builtin.template:
    src: calibre-web.service.j2
    dest: "{{ svc_home }}/.config/systemd/user/calibre-web.service"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0644"
  diff: true

- name: Enable and start Calibre-web service
  become: true
  become_user: "{{ svc_user }}"
  ansible.builtin.systemd:
    name: calibre-web
    scope: user
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Calibre-web to become available
  ansible.builtin.uri:
    url: "http://{{ listen_addr }}:{{ calibre_web_port }}/calibre/"
    status_code: [200, 302]
  register: calibre_health
  retries: 30
  delay: 5
  until: calibre_health is not failed

- name: Configure Calibre-web library path in app.db
  ansible.builtin.shell: |
    python3 -c "
    import sqlite3
    db = '{{ calibre_web_config_dir }}/app.db'
    conn = sqlite3.connect(db)
    c = conn.cursor()
    c.execute('UPDATE settings SET config_calibre_dir = ? WHERE id = 1', ('/books',))
    if c.rowcount == 0:
        print('no_row')
    else:
        conn.commit()
        print('configured')
    conn.close()
    "
  args:
    executable: /bin/bash
  register: calibre_config
  changed_when: "'configured' in calibre_config.stdout"
  failed_when: false

- name: Restart Calibre-web to apply library path
  become: true
  become_user: "{{ svc_user }}"
  ansible.builtin.systemd:
    name: calibre-web
    scope: user
    state: restarted
  when: calibre_config.changed | default(false)

- name: Deploy nginx config for Calibre-web
  ansible.builtin.template:
    src: nginx-calibre-web.conf.j2
    dest: /etc/nginx/sites-enabled/calibre-web.conf
    mode: "0644"
  diff: true
  notify: Reload nginx
