---
- name: Create Gitea data directory
  ansible.builtin.file:
    path: "{{ gitea_data_dir }}"
    state: directory
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0755"

- name: Create Gitea config directory
  ansible.builtin.file:
    path: "{{ gitea_config_dir }}"
    state: directory
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0755"

- name: Deploy Gitea Containerfile
  ansible.builtin.template:
    src: Containerfile.j2
    dest: "{{ gitea_config_dir }}/Containerfile"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0644"
  diff: true
  register: _containerfile

- name: Deploy Gitea configuration
  ansible.builtin.template:
    src: app.ini.j2
    dest: "{{ gitea_config_dir }}/app.ini"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0644"
  diff: true

- name: Copy offline deps for Gitea
  ansible.builtin.copy:
    src: "{{ offline_deps_dir }}/gitea/"
    dest: "{{ gitea_config_dir }}/"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0644"
  when: offline_mode | default(false)

- name: Build Gitea container image
  become: true
  become_user: "{{ svc_user }}"
  containers.podman.podman_image:
    name: "{{ gitea_image }}"
    tag: "{{ gitea_tag }}"
    path: "{{ gitea_config_dir }}"
    force: "{{ _containerfile.changed | default(true) }}"
  notify: Restart gitea

- name: Deploy Gitea systemd user unit
  ansible.builtin.template:
    src: gitea.service.j2
    dest: "{{ svc_home }}/.config/systemd/user/gitea.service"
    owner: "{{ svc_user }}"
    group: "{{ svc_user }}"
    mode: "0644"
  diff: true

- name: Enable and start Gitea service
  become: true
  become_user: "{{ svc_user }}"
  ansible.builtin.systemd:
    name: gitea
    scope: user
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Gitea to become available
  ansible.builtin.uri:
    url: "http://{{ listen_addr }}:{{ gitea_port }}/gitea/"
    status_code: [200, 302]
  register: gitea_health
  retries: 30
  delay: 5
  until: gitea_health is not failed

- name: Create Gitea admin user
  become: true
  become_user: "{{ svc_user }}"
  ansible.builtin.shell: |
    podman exec gitea gitea admin user create \
      --admin \
      --username {{ gitea_admin_user | quote }} \
      --password {{ gitea_admin_password | quote }} \
      --email {{ gitea_admin_email | quote }} \
      --must-change-password=false 2>&1
  args:
    executable: /bin/bash
  register: gitea_admin
  changed_when: "'created' in gitea_admin.stdout | lower"
  failed_when:
    - gitea_admin.rc != 0
    - "'already exists' not in gitea_admin.stdout | lower"
    - "'already exists' not in gitea_admin.stderr | lower"

- name: Deploy nginx config for Gitea
  ansible.builtin.template:
    src: nginx-gitea.conf.j2
    dest: /etc/nginx/sites-enabled/gitea.conf
    mode: "0644"
  diff: true
  notify: Reload nginx
